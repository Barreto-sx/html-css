<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tags HTML</title>
</head>
<body>
    <h1>tags em HTML</h1>
    <p>Em HTML5, podemos inserir os elementos da lista a seguir. passe o mouse sobre os termos para descobrir qual tag devera ultilizara em cada caso.</p>
    <ul>
        <li><abbr title="digite f">paragrafo</abbr></li>
        <li><abbr title="digite h1">titulos</abbr></li>
        <li><abbr title="digite img">imagens</abbr></li>
        <li><abbr title="digite abbr">abreviaçoes</abbr></li>
        <li><abbr title="digite code">codigos fonte</abbr></li>
        <li><abbr title="digite ol">lista numeradas</abbr></li>
        <li><abbr title="digite ul">lista com marcadores</abbr></li>
    </ul>
</body>
</html>
